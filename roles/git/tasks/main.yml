---
- name: Install Git CLI tools
  become: true
  ansible.builtin.apt:
    name: "{{ linux_git_packages }}"

- name: Install Git GUI tools
  become: true
  ansible.builtin.apt:
    name: "{{ linux_git_gui_packages }}"
  tags: git-gui

- name: Install ripgrep
  become: true
  ansible.builtin.apt:
    name: ripgrep

- name: Download git-completion.bash
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/git/git/master/contrib/completion/git-completion.bash
    dest: ~/.git-completion.bash
    mode: '0644'

- name: Add bash completion for git
  ansible.builtin.blockinfile:
    path: ~/.bashrc
    marker: "### {mark} Ansible managed: git-completion.bash"
    block: |
      if [ -f ~/.git-completion.bash ]; then
        . ~/.git-completion.bash
      fi

- name: Download bash-git-prompt
  ansible.builtin.git:
    repo: https://github.com/magicmonty/bash-git-prompt
    dest: ~/.bash-git-prompt
    version: master

- name: Enable and customise bash-git-prompt
  ansible.builtin.blockinfile:
    path: ~/.bashrc
    marker: "### {mark} Ansible managed: bash-git-prompt"
    block: "{{ lookup('file', 'bash-git-prompt.bashrc') }}"

- name: Ensure ~/.config exists
  ansible.builtin.file:
    path: ~/.config
    state: directory
    mode: '0700'

- name: Install ripgrep config
  ansible.builtin.copy:
    src: ripgrep.conf
    dest: ~/.config/ripgrep
    mode: '0644'

- name: Set ripgrep configuration path
  ansible.builtin.lineinfile:
    path: ~/.bashrc
    line: export RIPGREP_CONFIG_PATH=$HOME/.config/ripgrep
    regexp: '^export RIPGREP_CONFIG_PATH='

- name: Configure git to use SSH instead of HTTPS for GitHub
  # lineinfile produces an unparseable ~/.gitconfig (no [section] header)
  # which breaks every subsequent git invocation. git_config writes the
  # correct INI structure.
  community.general.git_config:
    scope: global
    name: 'url.git@github.com:.insteadOf'
    value: 'https://github.com/'
