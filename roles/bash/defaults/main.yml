---
repository: https://github.com/bash-it/bash-it.git
version: master
theme: pure
user: "{{ ansible_user_id }}"

aliases:
  - general
  - vim
  - git
  - maven
  - docker-compose
  - docker
  - curl
  - npm

plugins:
  # Removed: brew, ansible, progress — not present in current bash-it
  # (bash-it just logs "sorry, X does not appear to be an available
  # plugin." and moves on, but each miss breaks the changed_when regex).
  - base
  - alias-completion
  - git
  - nvm
  - sdkman
  - java
  - jenv

completions:
  # Removed: java, jenv — not present in current bash-it's completions/.
  - bash-it
  - brew
  - system
  - docker-compose
  - git
  - sdkman
  - nvm
  - npm
  - maven
